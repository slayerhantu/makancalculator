<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Bill Splitter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; color: #333; max-width: 500px; margin: 40px auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2c3e50; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 0.9em; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row input { flex: 1; }
        button { background-color: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #27ae60; }
        button.secondary { background-color: #3498db; margin-top: 5px; }
        button.secondary:hover { background-color: #2980b9; }
        .result-box { background: #e8f8f5; border-left: 5px solid #2ecc71; padding: 15px; border-radius: 6px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Bill Details</h2>
        <label>Who paid upfront?</label>
        <input type="text" id="payer" placeholder="e.g. Alice">

        <label>Is there a service charge?</label>
        <div class="row">
            <select id="hasService" onchange="toggleInput('servicePct', this.value)">
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>
            <input type="number" id="servicePct" placeholder="Service % (e.g. 10)" style="display:none;">
        </div>

        <label>Is there tax?</label>
        <div class="row">
            <select id="hasTax" onchange="toggleInput('taxPct', this.value)">
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>
            <input type="number" id="taxPct" placeholder="Tax % (e.g. 7)" style="display:none;">
        </div>
    </div>

    <div class="card">
        <h2>Friends & Items</h2>
        <div id="friendsContainer">
            <div class="row">
                <input type="text" placeholder="Friend's Name" class="friend-name">
                <input type="number" placeholder="Item Cost ($)" class="friend-cost">
            </div>
        </div>
        <button class="secondary" onclick="addFriendRow()">+ Add Another Friend</button>
        <button onclick="calculateSplit()">Calculate Split</button>
    </div>

    <div id="result" class="card result-box"></div>

    <script>
        function toggleInput(id, value) {
            document.getElementById(id).style.display = value === 'yes' ? 'block' : 'none';
        }

        function addFriendRow() {
            const container = document.getElementById('friendsContainer');
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <input type="text" placeholder="Friend's Name" class="friend-name">
                <input type="number" placeholder="Item Cost ($)" class="friend-cost">
            `;
            container.appendChild(row);
        }

        function calculateSplit() {
            const payer = document.getElementById('payer').value.trim();
            const hasService = document.getElementById('hasService').value === 'yes';
            const servicePct = hasService ? (parseFloat(document.getElementById('servicePct').value) || 0) / 100 : 0;
            const hasTax = document.getElementById('hasTax').value === 'yes';
            const taxPct = hasTax ? (parseFloat(document.getElementById('taxPct').value) || 0) / 100 : 0;

            const names = document.querySelectorAll('.friend-name');
            const costs = document.querySelectorAll('.friend-cost');

            if (!payer) { alert('Please enter who paid the bill.'); return; }

            let resultsHtml = `<h3>Grand Totals & Owed Amounts</h3>`;
            let grandTotal = 0;
            let breakdownHtml = '';

            names.forEach((node, index) => {
                const name = node.value.trim();
                const subtotal = parseFloat(costs[index].value) || 0;

                if (name) {
                    const itemService = subtotal * servicePct;
                    const itemTax = subtotal * taxPct;
                    const totalOwed = subtotal + itemService + itemTax;
                    grandTotal += totalOwed;

                    if (name.toLowerCase() !== payer.toLowerCase()) {
                        breakdownHtml += `<p><strong>${name}</strong> owes ${payer}: <b>$${totalOwed.toFixed(2)}</b></p>`;
                    }
                }
            });

            resultsHtml += `<p><strong>Grand Total Bill:</strong> $${grandTotal.toFixed(2)}</p><hr style="border:0; border-top:1px solid #ddd;">`;
            resultsHtml += breakdownHtml || '<p>Everyone is settled up!</p>';

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = resultsHtml;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
