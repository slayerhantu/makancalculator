<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Group Bill Splitter (MYR)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; color: #333; max-width: 1100px; margin: 40px auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2c3e50; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        .setup-row { display: flex; gap: 20px; margin-bottom: 15px; align-items: center; }
        .setup-row input { flex: 1; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px 10px; text-align: left; }
        th { background-color: #f8f9fa; }
        
        .btn { background-color: #2ecc71; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; }
        .btn:hover { background-color: #27ae60; }
        .btn-secondary { background-color: #3498db; }
        .btn-secondary:hover { background-color: #2980b9; }
        .btn-purple { background-color: #9b59b6; margin-left: 10px; display: none; }
        .btn-purple:hover { background-color: #8e44ad; }
        
        .tax-section { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .result-box { background: #e8f8f5; border-left: 5px solid #2ecc71; padding: 20px; border-radius: 6px; margin-top: 20px; display: none; }
        
        .checkbox-cell { text-align: center; vertical-align: middle; }
        .checkbox-cell input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #2ecc71;
            margin: 5px auto;
        }

        /* PRINT INTERACTION - Hides interface fluff when downloading picture */
        @media print {
            body { background: white; margin: 0; padding: 10px; max-width: 100%; }
            .card, #copyBtn, .btn, p, .tax-section { display: none !important; }
            #result { display: block !important; border: none !important; background: white !important; padding: 0 !important; }
            table { width: 100% !important; border: 1px solid #000 !important; }
            th, td { padding: 8px !important; border: 1px solid #000 !important; font-size: 12px !important; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. Group Setup</h2>
        
        <!-- NEW BILL DESCRIPTION FIELD -->
        <div style="margin-bottom: 20px;">
            <label>Bill Description / Event Name</label>
            <input type="text" id="billDesc" placeholder="e.g. Dinner at myburgerlab" style="width: 100%;">
        </div>

        <div class="setup-row">
            <div style="flex: 1;">
                <label>Who paid upfront?</label>
                <input type="text" id="payer" placeholder="e.g. Andy" style="width: 100%;">
            </div>
            <div style="flex: 2;">
                <label>All Friends Involved (Separated by commas)</label>
                <input type="text" id="friendsList" placeholder="Andy, PY, Bob, Azim, JJ" style="width: 100%;" onchange="generateTable()">
            </div>
        </div>
        <p style="font-size: 0.85em; color: #666; margin: 0;">* Press Tab or click out of the box after typing names to build your itemized spreadsheet below.</p>
    </div>

    <div class="card" id="itemsCard" style="display: none;">
        <h2>2. Itemized Receipts & Splitting</h2>
        <table id="itemsTable">
            <thead>
                <tr id="tableHeaderRow">
                    <th>Item Description</th>
                    <th style="width: 160px;">Price (MYR)</th>
                    <!-- Dynamic friend columns inject here -->
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Rows inject here -->
            </tbody>
        </table>
        
        <button class="btn btn-secondary" onclick="addItemRow()">+ Add Item Row</button>
        
        <div class="tax-section">
            <div>
                <label>Service Charge %</label>
                <input type="number" id="servicePct" value="10" placeholder="10" style="width: 100px;"> %
            </div>
            <div>
                <label>SST / Tax %</label>
                <input type="number" id="taxPct" value="6" placeholder="6" style="width: 100px;"> %
            </div>
        </div>
        
        <div style="margin-top: 25px; display: flex; align-items: center;">
            <button class="btn" onclick="calculateBill()">Calculate Total & Splits</button>
            <button id="copyBtn" class="btn btn-purple" onclick="window.print()">📷 Save Receipt Image</button>
        </div>
    </div>

    <div id="result" class="card result-box"></div>

    <script>
        let friends = [];

        function generateTable() {
            const inputStr = document.getElementById('friendsList').value;
            if (!inputStr.trim()) return;
            
            friends = inputStr.split(',').map(name => name.trim()).filter(name => name.length > 0);
            
            const headerRow = document.getElementById('tableHeaderRow');
            headerRow.innerHTML = '<th>Item Description</th><th style="width: 160px;">Price (MYR)</th>';
            friends.forEach(friend => {
                headerRow.innerHTML += `<th class="checkbox-cell">${friend}<br><span style="font-size:0.75em; font-weight:normal; color:#666;">Ate this?</span></th>`;
            });
            
            document.getElementById('tableBody').innerHTML = '';
            addItemRow();
            
            document.getElementById('itemsCard').style.display = 'block';
        }

        function addItemRow() {
            const tbody = document.getElementById('tableBody');
            const tr = document.createElement('tr');
            
            let checkboxes = '';
            friends.forEach((friend, index) => {
                checkboxes += `<td class="checkbox-cell"><input type="checkbox" class="friend-check-${index}"></td>`;
            });
            
            tr.innerHTML = `
                <td><input type="text" class="item-desc" placeholder="e.g. myburgerlab(sides)" style="width:100%;"></td>
                <td><div style="display:flex; align-items:center;"><span>MYR&nbsp;</span><input type="number" step="0.01" class="item-price" placeholder="0.00" style="width:100%;"></div></td>
                ${checkboxes}
            `;
            tbody.appendChild(tr);
        }

        function calculateBill() {
            const payer = document.getElementById('payer').value.trim();
            if (!payer) { alert('Please specify who paid upfront.'); return; }
            
            const billDesc = document.getElementById('billDesc').value.trim() || "Group Bill Split";
            const servicePct = (parseFloat(document.getElementById('servicePct').value) || 0) / 100;
            const taxPct = (parseFloat(document.getElementById('taxPct').value) || 0) / 100;
            
            const descs = document.querySelectorAll('.item-desc');
            const prices = document.querySelectorAll('.item-price');
            
            let personalSubtotals = {};
            friends.forEach(f => personalSubtotals[f] = 0);
            
            let overallSubtotal = 0;
            
            descs.forEach((node, rowIndex) => {
                const price = parseFloat(prices[rowIndex].value) || 0;
                if (price <= 0) return;
                
                overallSubtotal += price;
                
                let sharedWith = [];
                friends.forEach((friend, fIndex) => {
                    const isChecked = document.querySelectorAll(`.friend-check-${fIndex}`)[rowIndex].checked;
                    if (isChecked) {
                        sharedWith.push(friend);
                    }
                });
                
                if (sharedWith.length > 0) {
                    const splitPrice = price / sharedWith.length;
                    sharedWith.forEach(friend => {
                        personalSubtotals[friend] += splitPrice;
                    });
                }
            });

            const totalService = overallSubtotal * servicePct;
            const totalTax = overallSubtotal * taxPct;
            const grandTotal = overallSubtotal + totalService + totalTax;

            // Injected dynamic Description heading into the output
            let resultsHtml = `<h2 style="margin-bottom: 5px;">🧾 ${billDesc}</h2>`;
            resultsHtml += `<p style="margin-top: 0; color: #555; font-size: 0.9em;">Paid upfront by: <b>${payer}</b></p>`;
            
            resultsHtml += `<table><tr><th>Summary Breakdown</th><th>Total Amount</th></tr>`;
            resultsHtml += `<tr><td>Subtotal</td><td><b>MYR ${overallSubtotal.toFixed(2)}</b></td></tr>`;
            resultsHtml += `<tr><td>Service Charge (${document.getElementById('servicePct').value}%)</td><td>MYR ${totalService.toFixed(2)}</td></tr>`;
            resultsHtml += `<tr><td>SST (${document.getElementById('taxPct').value}%)</td><td>MYR ${totalTax.toFixed(2)}</td></tr>`;
            resultsHtml += `<tr style="font-weight:bold; background:#e2f0d9; border-top: 2px solid #000;"><td>Total To Pay</td><td>MYR ${grandTotal.toFixed(2)}</td></tr></table>`;
            
            resultsHtml += `<h3>💰 Final Breakdown (Owed to ${payer})</h3>`;
            resultsHtml += `<table><thead><tr><th>Friend Name</th><th>Base Share</th><th>Service Chg</th><th>SST Share</th><th style="background:#f2f2f2;">Total Owed</th></tr></thead><tbody>`;
            
            friends.forEach(friend => {
                const sub = personalSubtotals[friend];
                const sCharge = sub * servicePct;
                const tax = sub * taxPct;
                const finalPersonalTotal = sub + sCharge + tax;
                
                if (friend.toLowerCase() !== payer.toLowerCase()) {
                    resultsHtml += `<tr>
                        <td><b>${friend}</b></td>
                        <td>MYR ${sub.toFixed(2)}</td>
                        <td>MYR ${sCharge.toFixed(2)}</td>
                        <td>MYR ${tax.toFixed(2)}</td>
                        <td style="font-weight:bold; background:#fff3cd;">MYR ${finalPersonalTotal.toFixed(2)}</td>
                    </tr>`;
                }
            });
            resultsHtml += `</tbody></table>`;

            const resDiv = document.getElementById('result');
            resDiv.innerHTML = resultsHtml;
            resDiv.style.display = 'block';
            resDiv.scrollIntoView({ behavior: 'smooth' });

            document.getElementById('copyBtn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
