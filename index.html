<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makan Calculator by Andy</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; color: #333; max-width: 1100px; margin: 20px auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2, h3 { margin-top: 0; color: #2c3e50; }
        label { font-weight: bold; display: block; margin-bottom: 6px; font-size: 0.95em; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1em; width: 100%; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 600px) {
            .setup-grid { grid-template-columns: repeat(2, 1fr); }
            .full-width-md { grid-column: span 2; }
        }

        .payment-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 10px; }
        @media (min-width: 600px) {
            .payment-grid { grid-template-columns: repeat(4, 1fr); }
        }
        
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 15px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { border: 1px solid #ddd; padding: 10px 8px; text-align: left; font-size: 0.95em; }
        th { background-color: #f8f9fa; }
        
        .btn { background-color: #2ecc71; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; display: inline-block; }
        .btn:hover { background-color: #27ae60; }
        .btn-secondary { background-color: #3498db; }
        .btn-secondary:hover { background-color: #2980b9; }
        .btn-purple { background-color: #9b59b6; display: none; }
        .btn-purple:hover { background-color: #8e44ad; }
        
        .action-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 25px; align-items: center; }
        
        .tax-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .tax-section input { width: 100px; display: inline-block; }
        
        .result-box { background: #e8f8f5; border-left: 5px solid #2ecc71; padding: 20px; border-radius: 6px; margin-top: 20px; display: none; }
        .payment-summary-box { background: #fff; border: 2px dashed #3498db; padding: 15px; border-radius: 8px; margin-top: 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-between; align-items: center; }
        .qr-preview-container { max-width: 180px; text-align: center; }
        .qr-preview-img { max-width: 100%; height: auto; border-radius: 8px; border: 1px solid #ccc; display: block; margin-top: 5px; }

        .checkbox-cell { text-align: center; vertical-align: middle; }
        .checkbox-cell input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #2ecc71;
            margin: 5px auto;
            display: block;
        }

        input[type="file"] { padding: 6px; background: #fafafa; }

        @media print {
            body { background: white; margin: 0; padding: 10px; max-width: 100%; }
            .card, #copyBtn, .btn, p, .tax-section, .btn-secondary { display: none !important; }
            #result { display: block !important; border: none !important; background: white !important; padding: 0 !important; }
            table { width: 100% !important; border: 1px solid #000 !important; min-width: 100% !important; }
            th, td { padding: 8px !important; border: 1px solid #000 !important; font-size: 12px !important; }
            .payment-summary-box { border: 2px solid #000 !important; background: white !important; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Makan Calculator by Andy</h2>
        
        <div class="setup-grid">
            <div class="full-width-md">
                <label>Bill Description / Event Name</label>
                <input type="text" id="billDesc" placeholder="e.g. Dinner at myburgerlab">
            </div>
            <div>
                <label>Who paid upfront?</label>
                <input type="text" id="payer" placeholder="e.g. Andy" onchange="generateTable()">
            </div>
            <div>
                <label>All Friends Involved (Separated by commas) <span style="font-weight:normal; color:#e74c3c;">(exclude your own name)</span></label>
                <input type="text" id="friendsList" placeholder="PY, Bob, Azim, JJ" onchange="generateTable()">
            </div>
        </div>

        <div style="border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px;">
            <label style="color: #34495e;">💰 Payer Payment Details & QR Code (Optional)</label>
            <div class="payment-grid">
                <div>
                    <input type="text" id="payeeName" placeholder="Account Holder Name">
                </div>
                <div>
                    <input type="text" id="bankInfo" placeholder="Bank Name & Acc No.">
                </div>
                <div>
                    <input type="text" id="tngDuitnow" placeholder="TNG / DuitNow Phone Number">
                </div>
                <div>
                    <input type="file" id="qrUpload" accept="image/*" placeholder="Upload QR Code">
                </div>
            </div>
        </div>
        <p style="font-size: 0.82em; color: #666; margin-top: 10px; margin-bottom: 0;">* Press Tab or click out of the text fields after typing to automatically build your tracking spreadsheet below.</p>
    </div>

    <div class="card" id="itemsCard" style="display: none;">
        <h2>2. Itemized Receipts & Splitting</h2>
        <div class="table-responsive">
            <table id="itemsTable">
                <thead>
                    <tr id="tableHeaderRow">
                        <th>Item Description</th>
                        <th style="width: 140px;">Price (MYR)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
        
        <button class="btn btn-secondary" onclick="addItemRow()">+ Add Item Row</button>
        
        <div class="tax-section">
            <div>
                <label>Service Charge</label>
                <input type="number" id="servicePct" value="10"> %
            </div>
            <div>
                <label>SST</label>
                <input type="number" id="taxPct" value="6"> %
            </div>
        </div>
        
        <div class="action-bar">
            <button class="btn" onclick="calculateBill()">Calculate Total & Splits</button>
            <button id="copyBtn" class="btn btn-purple" onclick="window.print()">📷 Save Receipt Image</button>
        </div>
    </div>

    <div id="result" class="card result-box"></div>

    <script>
        let friends = [];
        let qrDataUrl = ""; 

        document.getElementById('qrUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    qrDataUrl = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function generateTable() {
            const payerInput = document.getElementById('payer').value.trim();
            const inputStr = document.getElementById('friendsList').value.trim();
            
            if (!payerInput) return;
            
            friends = [payerInput];
            
            if (inputStr) {
                const additionalFriends = inputStr.split(',').map(name => name.trim()).filter(name => name.length > 0 && name.toLowerCase() !== payerInput.toLowerCase());
                friends = friends.concat(additionalFriends);
            }
            
            const headerRow = document.getElementById('tableHeaderRow');
            headerRow.innerHTML = '<th>Item Description</th><th style="width: 140px;">Price (MYR)</th>';
            friends.forEach(friend => {
                headerRow.innerHTML += `<th class="checkbox-cell">${friend}<br><span style="font-size:0.7em; font-weight:normal; color:#666;">Ate this?</span></th>`;
            });
            
            document.getElementById('tableBody').innerHTML = '';
            addItemRow();
            
            document.getElementById('itemsCard').style.display = 'block';
        }

        function addItemRow() {
            const tbody = document.getElementById('tableBody');
            const tr = document.createElement('tr');
            
            let checkboxes = '';
            friends.forEach((friend, index) => {
                checkboxes += `<td class="checkbox-cell"><input type="checkbox" class="friend-check-${index}"></td>`;
            });
            
            tr.innerHTML = `
                <td><input type="text" class="item-desc" placeholder="e.g. myburgerlab(sides)"></td>
                <td><div style="display:flex; align-items:center;"><span>RM&nbsp;</span><input type="number" step="0.01" class="item-price" placeholder="0.00"></div></td>
                ${checkboxes}
            `;
            tbody.appendChild(tr);
        }

        function calculateBill() {
            const payer = document.getElementById('payer').value.trim();
            if (!payer) { alert('Please specify who paid upfront.'); return; }
            
            const billDesc = document.getElementById('billDesc').value.trim() || "Makan Breakdown";
            const servicePct = (parseFloat(document.getElementById('servicePct').value) || 0) / 100;
            const taxPct = (parseFloat(document.getElementById('taxPct').value) || 0) / 100;
            
            const descs = document.querySelectorAll('.item-desc');
            const prices = document.querySelectorAll('.item-price');
            
            let personalSubtotals = {};
            let personalItems = {};
            
            friends.forEach(f => {
                personalSubtotals[f] = 0;
                personalItems[f] = [];
            });
            
            let overallSubtotal = 0;
            
            descs.forEach((node, rowIndex) => {
                const itemLabel = node.value.trim() || `Item #${rowIndex + 1}`;
                const price = parseFloat(prices[rowIndex].value) || 0;
                if (price <= 0) return;
                
                overallSubtotal += price;
                
                let sharedWith = [];
                friends.forEach((friend, fIndex) => {
                    const isChecked = document.querySelectorAll(`.friend-check-${fIndex}`)[rowIndex].checked;
                    if (isChecked) {
                        sharedWith.push(friend);
                    }
                });
                
                if (sharedWith.length > 0) {
                    const splitPrice = price / sharedWith.length;
                    sharedWith.forEach(friend => {
                        personalSubtotals[friend] += splitPrice;
                        personalItems[friend].push(itemLabel);
                    });
                }
            });

            const totalService = overallSubtotal * servicePct;
            const totalTax = overallSubtotal * taxPct;
            const grandTotal = overallSubtotal + totalService + totalTax;

            let resultsHtml = `<h2 style="margin-bottom: 5px;">🧾 ${billDesc}</h2>`;
            resultsHtml += `<p style="margin-top: 0; color: #555; font-size: 0.9em;">Calculated via Makan Calculator by Andy | Paid by: <b>${payer}</b></p>`;
            
            resultsHtml += `<div class="table-responsive"><table><tr><th>Summary Breakdown</th><th>Total Amount</th></tr>`;
            resultsHtml += `<tr><td>Subtotal</td><td><b>MYR ${overallSubtotal.toFixed(2)}</b></td></tr>`;
            resultsHtml += `<tr><td>Service Charge (${document.getElementById('servicePct').value}%)</td><td>MYR ${totalService.toFixed(2)}</td></tr>`;
            resultsHtml += `<tr><td>SST (${document.getElementById('taxPct').value}%)</td><td>MYR ${totalTax.toFixed(2)}</td></tr>`;
            resultsHtml += `<tr style="font-weight:bold; background:#e2f0d9; border-top: 2px solid #000;"><td>Total To Pay</td><td>MYR ${grandTotal.toFixed(2)}</td></tr></table></div>`;
            
            resultsHtml += `<h3>💰 Final Breakdown (Owed to ${payer})</h3>`;
            resultsHtml += `<div class="table-responsive"><table><thead><tr><th>Friend Name</th><th>Item Description</th><th>Service Chg</th><th>SST Share</th><th style="background:#fff3cd;">Total Owed</th></tr></thead><tbody>`;
            
            friends.forEach(friend => {
                const sub = personalSubtotals[friend];
                const sCharge = sub * servicePct;
                const tax = sub * taxPct;
                const finalPersonalTotal = sub + sCharge + tax;
                const itemsListString = personalItems[friend].length > 0 ? personalItems[friend].join(', ') : '<i>None</i>';
                
                if (friend.toLowerCase() !== payer.toLowerCase()) {
                    resultsHtml += `<tr>
                        <td><b>${friend}</b></td>
                        <td style="font-size: 0.9em; max-width: 250px; color: #555;">${itemsListString}</td>
                        <td>MYR ${sCharge.toFixed(2)}</td>
                        <td>MYR ${tax.toFixed(2)}</td>
                        <td style="font-weight:bold; background:#fff3cd;">MYR ${finalPersonalTotal.toFixed(2)}</td>
                    </tr>`;
                }
            });
            resultsHtml += `</tbody></table></div>`;

            const holderName = document.getElementById('payeeName').value.trim();
            const bankDetails = document.getElementById('bankInfo').value.trim();
            const phoneDetails = document.getElementById('tngDuitnow').value.trim();
            
            if (holderName || bankDetails || phoneDetails || qrDataUrl) {
                resultsHtml += `<div class="payment-summary-box">`;
                resultsHtml += `<div style="flex: 1; min-width: 250px;">`;
                resultsHtml += `<h3>📌 Payment Transfer Instruction</h3>`;
                if (holderName)  resultsHtml += `<p style="margin: 6px 0;"><b>Account Holder Name:</b> ${holderName}</p>`;
                if (bankDetails)  resultsHtml += `<p style="margin: 6px 0;"><b>Bank Account Details:</b> ${bankDetails}</p>`;
                if (phoneDetails) resultsHtml += `<p style="margin: 6px 0;"><b>DuitNow / Touch 'n Go Number:</b> ${phoneDetails}</p>`;
                resultsHtml += `</div>`;
                
                if (qrDataUrl) {
                    resultsHtml += `<div class="qr-preview-container">`;
                    resultsHtml += `<label style="margin-bottom: 2px;">Scan to Pay</label>`;
                    resultsHtml += `<img src="${qrDataUrl}" class="qr-preview-img" alt="Payment QR Code">`;
                    resultsHtml += `</div>`;
                }
                resultsHtml += `</div>`;
            }

            const resDiv = document.getElementById('result');
            resDiv.innerHTML = resultsHtml;
            resDiv.style.display = 'block';
            resDiv.scrollIntoView({ behavior: 'smooth' });

            document.getElementById('copyBtn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
